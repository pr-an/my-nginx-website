<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salunkhe Family</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #ff9933, #ffffff, #138808);
        text-align: center;
        color: #222;
    }

    .container {
        margin-top: 60px;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 45px;
        color: #b30000;
        text-shadow: 2px 2px 10px #fff;
    }

    h2 {
        font-size: 28px;
        color: #000080;
        margin-bottom: 20px;
    }

    .card {
        background: white;
        width: 320px;
        margin: 15px auto;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .footer {
        margin-top: 30px;
        font-size: 18px;
        color: #333;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(-20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>

</head>

<body>

<div class="container">

    <h1>🙏 Radhe Radhe 🙏</h1>
    <h2>Welcome to Salunkhe Family</h2>

    <div class="card">👨 Murlidhar Salunkhe</div>
    <div class="card">👩 Sangita Salunkhe</div>
    <div class="card">🧑 Pranil Salunkhe</div>
    <div class="card">👩 Vaishnavi Salunkhe</div>
    <div class="card">🧑 Pratik Salunkhe</div>
    <div class="card">👶 Rishank Salunkhe</div>

    <div class="footer">
        🌟 Family is not an important thing, it's everything 🌟
    </div>

</div>

</body>
</html>
